<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:0;height:100vh;display:grid;place-items:center;background:#0b1220;color:#eaeef6}
    .card{background:#0f1720;padding:28px;border-radius:12px;width:360px}
    input{width:100%;padding:10px;border-radius:8px;border:1px solid #233244;background:#071022;color:#eaeef6}
    button{width:100%;padding:10px;border-radius:8px;background:#1b6fb6;border:none;color:white}
  </style>
  <script src="scripts/auth.js"></script>
  <script>
    async function sha256hex(str) {
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function onSubmit(e){
      e.preventDefault();
      const p = document.getElementById('pw').value;
      // compute and show debug hash — useful to compare against scripts/auth.js
      try {
        const h = await sha256hex(p);
        console.log('Computed SHA-256 of input:', h);
        const dbg = document.getElementById('debugHash');
        if (dbg) dbg.textContent = 'Computed hash: ' + h;
      } catch(err) {
        console.warn('Hash compute failed', err);
      }

      const ok = await window.SimpleAuth.signIn(p);
      if (ok) window.location.href = '/index.html';
      else alert('Wrong password');
    }
  </script>
</head>
<body>
  <div class="card">
    <h2>Enter password</h2>
    <form onsubmit="onSubmit(event)">
      <input id="pw" type="password" placeholder="password" />
      <div style="height:12px"></div>
      <button>Sign in</button>
    </form>
    <div id="debugHash" style="margin-top:12px;color:#9fb0c8;font-size:13px"></div>
  </div>
</body>
</html>
