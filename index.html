<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: linear-gradient(180deg,#071020,#081226);
      --muted: #95b0c8;
      --accent: #7be3ff;
      --accent2: #6cf3b1;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Noto Sans JP',system-ui,Arial;background:var(--bg);color:#e8f7ff}
    .wrap{max-width:1100px;margin:28px auto;padding:32px}
    h1{font-family:'Rajdhani',sans-serif;text-align:center;margin:0 0 8px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:980px;margin:0 auto}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
    .tile{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:20px;border-radius:12px;text-align:center;min-height:140px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:1px solid rgba(120,180,255,0.05)}
    .tile h2{font-family:'Rajdhani',sans-serif;margin:0 0 6px}
    .tile p{color:var(--muted);margin:0}
    .btn{margin-top:10px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#021426;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dashboard</h1>
    <div style="text-align:center;color:var(--muted);margin-bottom:14px">Two rows of three — quick access</div>

    <div class="grid">
      <a class="tile" href="walks.html"><h2>Walks</h2><p>Log a walk</p><span class="btn">Open</span></a>
      <a class="tile" href="work.html"><h2>Work</h2><p>Notes & tasks</p><span class="btn">Open</span></a>
      <a class="tile" href="household.html"><h2>Household</h2><p>Net worth</p><span class="btn">Open</span></a>
      <a class="tile" href="leverage.html"><h2>Leverage</h2><p>Micro steps</p><span class="btn">Open</span></a>
      <a class="tile" href="business.html"><h2>Business</h2><p>Operations</p><span class="btn">Open</span></a>
      <a class="tile" id="reminderTile" href="#" style="cursor:pointer"><h2 id="reminderTitle">Reminder</h2><p id="reminderBody">Loading…</p><span class="btn" id="reminderBtn">Go</span></a>
    </div>
  </div>

  <script src="scripts/store-sync.js"></script>
  <script src="scripts/whatsnext.js"></script>
  <script>
    function bindReminder(){
      const next = (window.WhatsNext && window.WhatsNext.computeNext && window.WhatsNext.computeNext(window.store)) || {title:'All caught up',body:'',action:'idle'};
      document.getElementById('reminderTitle').textContent = next.title;
      document.getElementById('reminderBody').textContent = next.body || '';
      const tile = document.getElementById('reminderTile');
      tile.onclick = (e)=>{
        e.preventDefault();
        try{ const prog = window.store.get('fh.progress',[]); prog.unshift({date:Date.now(),text:'Started: '+next.title}); window.store.set('fh.progress', prog.slice(0,200)); }catch(e){}
  if(next.action==='walk') location.href='walks.html';
  else if(next.action==='household') location.href='household.html';
  else if(next.action==='leverage') location.href='leverage.html';
  else if(next.action==='work') location.href='work.html';
  else if(next.action==='business') location.href='business.html';
        else if(window.WhatsNext && window.WhatsNext.showModal) window.WhatsNext.showModal(next.title,next.body,()=>{},()=>{});
      };
    }
    window.addEventListener('load', ()=>{ if(window.WhatsNext) bindReminder(); else { const s=document.createElement('script'); s.src='scripts/whatsnext.js'; s.onload=bindReminder; document.body.appendChild(s);} });
  </script>
</body>
</html>
